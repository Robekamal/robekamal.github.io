title: "نام وبلاگ من"
description: "یادداشت‌ها، پژوهش‌ها و نوشته‌های شخصی من"

lang: "fa"
direction: "rtl"
timezone: "Asia/Tehran"

url: "https://elmmdo.github.io"
baseurl: ""

instagram_url: "https://instagram.com/YOUR_USERNAME"
telegram_url: "https://t.me/YOUR_USERNAME"

permalink: /blog/:year/:month/:day/:title/

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

  - scope:
      path: ""
      type: "projects"
    values:
      layout: "default"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

markdown: kramdown

future: false
show_drafts: false

kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

sass:
  style: compressed

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
