# ==========================================
# تنظیمات اصلی وب‌سایت
# ==========================================

title: "رو به کمال"
description: "یادداشت‌ها، پژوهش‌ها و نوشته‌های شخصی من"

lang: "fa"
direction: "rtl"
timezone: "Asia/Tehran"


# ==========================================
# آدرس وب‌سایت
# ==========================================

url: "https://robekamal.github.io"
baseurl: ""


# ==========================================
# اطلاعات نویسنده
# ==========================================

author:
  name: "نام و نام خانوادگی شما"
  bio: "پژوهشگر، نویسنده و یادگیرنده"
  image: "/assets/images/uploads/about-author.jpg"

email: "your-email@example.com"


# ==========================================
# شبکه‌های اجتماعی
# نام کاربری را بدون علامت @ وارد کن
# ==========================================

instagram_username: "YOUR_USERNAME"
instagram_url: "https://www.instagram.com/YOUR_USERNAME"

telegram_username: "YOUR_USERNAME"
telegram_url: "https://t.me/YOUR_USERNAME"


# ==========================================
# ساختار آدرس نوشته‌ها
# ==========================================

permalink: /blog/:year/:month/:day/:title/


# ==========================================
# مجموعه پروژه‌ها
# ==========================================

collections:
  projects:
    output: true
    permalink: /projects/:name/


# ==========================================
# مقادیر پیش‌فرض صفحات
# ==========================================

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

  - scope:
      path: ""
      type: "projects"
    values:
      layout: "default"


# ==========================================
# افزونه‌ها
# ==========================================

plugins:
  - jekyll-feed
  - jekyll-seo-tag


# ==========================================
# تنظیمات Markdown
# ==========================================

markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false


# ==========================================
# تنظیمات انتشار
# ==========================================

future: false
show_drafts: false


# ==========================================
# تنظیمات Sass
# ==========================================

sass:
  style: compressed


# ==========================================
# فایل‌ها و پوشه‌های حذف‌شده از خروجی
# ==========================================

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
